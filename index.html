<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify to Join Unknown Modz</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0f0f0f; color: white; }
        .container { background: #1a1a1a; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .btn { display: none; margin-top: 20px; padding: 12px 24px; background: #0088cc; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; }
        #status { margin-top: 15px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Unknown Modz</h1>
        <p>Verify you are human to get your invite link</p>
        
        <div class="cf-turnstile" data-sitekey="0x4AAAAAACp_SoTx_k_KB1VS" data-callback="onVerify"></div>
        
        <div id="status">Waiting for verification...</div>
        <a id="join-btn" class="btn" href="#">Click here to Join</a>
    </div>

    <script>
        async function onVerify(token) {
            document.getElementById('status').innerText = "Generating secure link...";
            
            try {
                // Change the URL below to your Cloudflare Worker URL
                const response = await fetch('https://verification.unknown-modz.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });

                const data = await response.json();
                
                if (data.link) {
                    document.getElementById('status').innerText = "Verified! Link ready.";
                    const btn = document.getElementById('join-btn');
                    btn.href = data.link;
                    btn.style.display = "inline-block";
                } else {
                    document.getElementById('status').innerText = "Error: " + (data.error || "Unknown error");
                }
            } catch (err) {
                document.getElementById('status').innerText = "Connection failed.";
            }
        }
    </script>
</body>
</html>
